global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'dicomcloud'

scrape_configs:
  - job_name: 'dicomcloud-api'
    static_configs:
      - targets: ['api:9464']
    metrics_path: '/metrics'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
